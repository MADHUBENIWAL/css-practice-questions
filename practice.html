<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>next 10 questionst</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <!-- Inline -->
     <span style="background-color: yellow;">Span 1</span>
     <span style="background-color: lightgreen;">Span 2</span>
     <br><br>
     <!-- Block -->
    <div style="width:200px; height:50px; background-color:red;"></div>
    <div style="width:200px; height:50px; background-color:blue;"></div>
    <br>
    <!-- Inline-block -->
    <div style="display:inline-block; width:150px; height:100px; margin:10px; background-color:orange;"></div>
    <div style="display:inline-block; width:150px; height:100px; margin:10px; background-color:green;"></div>
    <div style="display:inline-block; width:150px; height:100px; margin:10px; background-color:pink;"></div>
    <br><br>
     <!-- Hide -->
     <p style="display:none;">Hidden using display none</p>
     <p style="visibility:hidden;">Hidden using visibility</p>
     <!-- RGBA -->
    <div style="width:200px; height:200px; background-color:rgba(255,0,0,0.5);"></div>
    <br>
</body>
</html>
